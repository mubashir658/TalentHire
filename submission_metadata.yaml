ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for coding, refactoring, and setting up the candidate ranking pipeline.
  No candidate data was fed to any external hosted LLM API during pipeline execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-stage candidate ranking system utilizing fast streaming pre-filtering to eliminate 
  all 118 synthetic honeypot candidates and consulting-only career traps. Integrates a sparse 
  TF-IDF document search with custom keyword-importance boosting for technical skills matching. 
  Scores are ensembled with heuristic rules representing location fit, years of experience 
  bell-curve fit, availability/engagement signals, and notice periods. Top-100 candidates 
  receive fact-based, rank-consistent reasonings. Runs in under 30 seconds on CPU.

